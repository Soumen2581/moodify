<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodify | Your Vibe, Your Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .spotify-green { color: #1DB954; }
        .bg-spotify-green { background-color: #1DB954; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center py-12 px-4">

<header class="text-center mb-12">
    <h1 class="text-6xl font-black tracking-tighter mb-2">
        Mood<span class="spotify-green">ify</span>
    </h1>
    <p class="text-gray-400 text-lg">Personalized Spotify playlists based on your current energy.</p>
</header>

<main class="w-full max-w-2xl">
    <div id="login-section" class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl text-center shadow-2xl mb-8">
        <h2 class="text-2xl font-bold mb-6">Connect your Account</h2>
        <p class="text-gray-400 mb-8">To analyze your music taste and generate playlists, we need to connect to Spotify.</p>
        <a href="/api/auth/spotify"
           class="inline-block bg-spotify-green hover:bg-green-400 text-black font-bold py-4 px-10 rounded-full transition-all transform hover:scale-105 active:scale-95">
            LOG IN WITH SPOTIFY
        </a>
    </div>

    <section class="mb-12">
        <h3 class="text-xl font-bold mb-6 border-b border-zinc-800 pb-2">How are you feeling?</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="mood-grid">
            <button onclick="fetchTracks('happy')" class="mood-card bg-zinc-900 hover:bg-yellow-600/20 border border-zinc-800 hover:border-yellow-500 p-6 rounded-xl transition-all group">
                <span class="text-3xl block mb-2">☀️</span>
                <span class="font-bold group-hover:text-yellow-500">Happy</span>
            </button>
            <button onclick="fetchTracks('sad')" class="mood-card bg-zinc-900 hover:bg-blue-600/20 border border-zinc-800 hover:border-blue-500 p-6 rounded-xl transition-all group">
                <span class="text-3xl block mb-2">🌧️</span>
                <span class="font-bold group-hover:text-blue-500">Sad</span>
            </button>
            <button onclick="fetchTracks('energetic')" class="mood-card bg-zinc-900 hover:bg-red-600/20 border border-zinc-800 hover:border-red-500 p-6 rounded-xl transition-all group">
                <span class="text-3xl block mb-2">🔥</span>
                <span class="font-bold group-hover:text-red-500">Energetic</span>
            </button>
            <button onclick="fetchTracks('chill')" class="mood-card bg-zinc-900 hover:bg-purple-600/20 border border-zinc-800 hover:border-purple-500 p-6 rounded-xl transition-all group">
                <span class="text-3xl block mb-2">🧘</span>
                <span class="font-bold group-hover:text-purple-500">Chill</span>
            </button>
        </div>
    </section>

    <section id="results-section" class="hidden">
        <h3 class="text-xl font-bold mb-6 border-b border-zinc-800 pb-2">Recommended for You</h3>
        <div id="track-list" class="space-y-3">
        </div>
    </section>
</main>

<footer class="mt-auto pt-12 text-zinc-600 text-sm">
    &copy; 2026 Moodify Project &bull; Powered by Spotify API
</footer>

<script>
    async function fetchTracks(mood) {
        const resultsSection = document.getElementById('results-section');
        const trackList = document.getElementById('track-list');

        // Show loading state
        resultsSection.classList.remove('hidden');
        trackList.innerHTML = `<p class="text-zinc-500 animate-pulse">Finding the perfect ${mood} tracks...</p>`;

        try {
            const response = await fetch(`/api/tracks?mood=${mood}`);
            const tracks = await response.json();

            if (tracks.length === 0) {
                trackList.innerHTML = `<p class="text-red-400 text-sm">No tracks found. Make sure you are logged in!</p>`;
                return;
            }

            // Render the tracks
            trackList.innerHTML = tracks.map(track => `
                <div class="flex items-center p-3 bg-zinc-900/50 border border-zinc-800 rounded-lg hover:bg-zinc-800 transition">
                    <img src="${track.albumArt || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded mr-4" alt="Album Art">
                    <div>
                        <p class="font-bold text-white">${track.name}</p>
                        <p class="text-sm text-zinc-400">${track.artist}</p>
                    </div>
                    <a href="${track.url}" target="_blank" class="ml-auto text-spotify-green hover:underline text-sm font-bold">PLAY</a>
                </div>
            `).join('');

        } catch (error) {
            console.error('Fetch error:', error);
            trackList.innerHTML = `<p class="text-red-500">Error connecting to the server. Is the backend running?</p>`;
        }
    }
</script>
</body>
</html>
