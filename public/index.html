<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodify</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Mood<span class="accent">ify</span></h1>
      <p class="tagline">YouTube picks by mood</p>
    </header>

    <p id="api-banner" class="banner">Loading…</p>

    <section>
      <h2>Mood</h2>
      <div id="mood-grid" class="grid"></div>
    </section>

    <section id="results-section" class="results hidden">
      <h2>Suggestions</h2>
      <p id="search-hint" class="hint hidden"></p>
      <div id="track-list"></div>
    </section>
  </div>
  <script src="/script.js" defer></script>
</body>
</html>
